# ═══════════════════════════════════════════════════════════════
# Telegram Booking Bot — Docker Compose
# ═══════════════════════════════════════════════════════════════
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f bot    # Follow bot logs
#   docker-compose down           # Stop all services
# ═══════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: booking_db
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U booking_user -d booking_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Client Bot ──────────────────────────────────────────────
  bot_client:
    build: .
    container_name: booking_client_bot
    command: python main_client.py
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CLIENT_BOT_TOKEN: ${CLIENT_BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://booking_user:booking_pass@postgres:5432/booking_db
    restart: unless-stopped

  # ─── Business Bot ────────────────────────────────────────────
  bot_business:
    build: .
    container_name: booking_business_bot
    command: python main_business.py
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BUSINESS_BOT_TOKEN: ${BUSINESS_BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://booking_user:booking_pass@postgres:5432/booking_db
    restart: unless-stopped

volumes:
  postgres_data:
